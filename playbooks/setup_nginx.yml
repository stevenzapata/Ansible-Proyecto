---
- name: Instalar y configurar servidor web Nginx
  hosts: "{{ target_hosts | default('webservers') }}"
  become: true

  vars:
    nginx_server_name: "{{ server_name | default('mi-sitio.local') }}"
    nginx_server_port: "{{ http_port | default(80) }}"
    nginx_webroot: "/var/www/{{ nginx_server_name }}"
    nginx_deploy_test_page: true

  roles:
    - role: common
    - role: nginx

  post_tasks:
    - name: Verificar respuesta HTTP del servidor
      ansible.builtin.uri:
        url: "http://{{ ansible_host | default('localhost') }}:{{ nginx_server_port }}"
        return_content: false
        status_code: 200
      register: http_check
      ignore_errors: true

    - name: Resultado de la verificación HTTP
      ansible.builtin.debug:
        msg: >
          Nginx en {{ inventory_hostname }}:
          {{ 'OK (HTTP ' + http_check.status | string + ')' if not http_check.failed else 'FALLO - revisar logs' }}
