---
- name: Instalar y configurar servidor web Nginx
  hosts: "{{ target_hosts | default('webservers') }}"
  become: true

  roles:
    - role: common
    - role: nginx
    - role: healthcheck
      vars:
        healthchecks:
          - { type: service, name: nginx }
          - { type: port,    port: "{{ nginx_server_port }}" }
          - { type: http,    url: "http://localhost:{{ nginx_server_port }}" }
