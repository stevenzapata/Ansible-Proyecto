---
- name: Instalar y configurar servidor web Apache
  hosts: "{{ target_hosts | default('webservers') }}"
  become: true

  roles:
    - role: common
    - role: apache

  post_tasks:
    - name: Verificar respuesta HTTP del servidor
      ansible.builtin.uri:
        url: "http://{{ ansible_host | default('localhost') }}:{{ apache_server_port }}"
        return_content: false
        status_code: 200
      register: http_check
      ignore_errors: true

    - name: Resultado de la verificación HTTP
      ansible.builtin.debug:
        msg: >-
          Apache en {{ inventory_hostname }}:
          {{ 'OK (HTTP ' + http_check.status | string + ')' if not http_check.failed else 'FALLO - revisar logs' }}
