---
- name: Instalar y configurar servidor web Apache
  hosts: "{{ target_hosts | default('webservers') }}"
  become: true

  roles:
    - role: common
    - role: apache
    - role: healthcheck
      vars:
        healthchecks:
          - { type: service, name: "{{ apache_service_name }}", name_windows: "{{ apache_service_name_windows }}" }
          - { type: port,    port: "{{ apache_server_port }}" }
          - { type: http,    url: "http://localhost:{{ apache_server_port }}" }
