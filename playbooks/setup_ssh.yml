---
- name: Instalar y configurar servidor SSH
  hosts: "{{ target_hosts | default('all') }}"
  become: true

  roles:
    - role: ssh
    - role: healthcheck
      vars:
        healthchecks:
          - { type: service, name: "{{ ssh_service_name }}", name_windows: sshd }
          - { type: port,    port: "{{ ssh_port }}" }
