---
- name: Instalar y configurar servidor SSH con credenciales
  hosts: localhost
  become: true

  vars_files:
    - ../group_vars/all.yml

  # Sobreescribe en el playbook o pasa con -e al ejecutar
  vars:
    ssh_port: 22
    ssh_permit_root_login: "no"
    ssh_password_authentication: "no"
    # ssh_users:
    #   - name: deployer
    #     public_key: "ssh-rsa AAAAB3Nza..."

  roles:
    - role: ssh

  post_tasks:
    - name: Verificar que el servicio SSH esté corriendo
      ansible.builtin.service_facts:

    - name: Confirmar estado del servicio
      ansible.builtin.debug:
        msg: "SSH activo: {{ ansible_facts.services['ssh.service'].state | default('desconocido') }}"
