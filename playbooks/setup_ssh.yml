---
- name: Instalar y configurar servidor SSH
  hosts: "{{ target_hosts | default('all') }}"
  become: true

  roles:
    - role: ssh

  post_tasks:
    - name: Verificar que el servicio SSH está corriendo
      ansible.builtin.service_facts:

    - name: Confirmar estado del servicio
      ansible.builtin.debug:
        msg: "SSH activo: {{ ansible_facts.services['ssh.service'].state | default('desconocido') }}"
