---
- name: Obtener home del usuario {{ ssh_keygen_user }}
  ansible.builtin.getent:
    database: passwd
    key: "{{ ssh_keygen_user }}"

- name: Calcular ruta de la clave
  ansible.builtin.set_fact:
    _ssh_keygen_resolved_path: >-
      {{ ssh_keygen_path if ssh_keygen_path | length > 0
         else ansible_facts.getent_passwd[ssh_keygen_user][4] ~ '/.ssh/id_' ~ ssh_keygen_type }}

- name: Asegurar que el directorio .ssh existe
  ansible.builtin.file:
    path: "{{ _ssh_keygen_resolved_path | dirname }}"
    state: directory
    owner: "{{ ssh_keygen_user }}"
    group: "{{ ssh_keygen_user }}"
    mode: "0700"

- name: Generar par de claves SSH
  community.crypto.openssh_keypair:
    path: "{{ _ssh_keygen_resolved_path }}"
    type: "{{ ssh_keygen_type }}"
    comment: "{{ ssh_keygen_comment }}"
    passphrase: "{{ ssh_keygen_passphrase }}"
    force: "{{ ssh_keygen_force }}"
    owner: "{{ ssh_keygen_user }}"
    group: "{{ ssh_keygen_user }}"
    mode: "0600"
  register: keypair_result

- name: Exponer clave pública como fact
  ansible.builtin.set_fact:
    ssh_keygen_public_key: "{{ keypair_result.public_key }}"
    ssh_keygen_key_path: "{{ _ssh_keygen_resolved_path }}"

- name: Mostrar clave pública generada
  ansible.builtin.debug:
    msg: |
      Clave pública para {{ ssh_keygen_user }}@{{ inventory_hostname }}:
      {{ ssh_keygen_public_key }}

      Registra esta clave en el servidor de backup con:
        ssh-copy-id -i {{ _ssh_keygen_resolved_path }}.pub {{ ssh_keygen_user }}@<servidor-remoto>
