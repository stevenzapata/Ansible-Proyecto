---
# ── Instalación ───────────────────────────────────────────────────────────────
# Paquetes Docker a instalar (Linux)
docker_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin

# ── Usuarios ──────────────────────────────────────────────────────────────────
# Usuarios que podrán usar docker sin sudo (se añaden al grupo docker)
docker_users: []
# Ejemplo:
# docker_users:
#   - stevenz

# ── Daemon (Linux) ────────────────────────────────────────────────────────────
# Opciones del daemon de Docker → generan /etc/docker/daemon.json
# Cualquier opción válida de daemon.json se puede añadir aquí como clave: valor
docker_daemon_options:
  log-driver: json-file
  log-opts:
    max-size: "100m"
    max-file: "3"
  storage-driver: overlay2

# ── Redes ─────────────────────────────────────────────────────────────────────
docker_networks: []
# Ejemplo:
# docker_networks:
#   - name: frontend
#     driver: bridge
#   - name: backend
#     driver: bridge
#     internal: true        # red interna sin acceso externo

# ── Volúmenes ─────────────────────────────────────────────────────────────────
docker_volumes: []
# Ejemplo:
# docker_volumes:
#   - name: datos-db
#   - name: config-app

# ── Contenedores ──────────────────────────────────────────────────────────────
docker_containers: []
# Cada contenedor admite:
#   name           (requerido) nombre del contenedor
#   image          (requerido) imagen:tag
#   state          started | stopped | absent       (defecto: started)
#   restart_policy always | unless-stopped | on-failure | no  (defecto: unless-stopped)
#   ports          lista de "host:contenedor"
#   volumes        lista de "origen:destino[:opciones]"
#   env            dict de variables de entorno
#   networks       lista de {name: red}
#   labels         dict de etiquetas
#   pull           forzar pull de imagen al arrancar  (defecto: true)
#   command        comando a ejecutar en el contenedor
#
# Ejemplo:
# docker_containers:
#   - name: web
#     image: nginx:latest
#     restart_policy: always
#     ports:
#       - "80:80"
#       - "443:443"
#     volumes:
#       - /srv/web/html:/usr/share/nginx/html:ro
#     networks:
#       - name: frontend
#     labels:
#       app: web
#       env: produccion
#
#   - name: db
#     image: postgres:16
#     restart_policy: unless-stopped
#     volumes:
#       - datos-db:/var/lib/postgresql/data
#     env:
#       POSTGRES_DB: miapp
#       POSTGRES_USER: appuser
#       POSTGRES_PASSWORD: "{{ vault_db_password }}"
#     networks:
#       - name: backend
