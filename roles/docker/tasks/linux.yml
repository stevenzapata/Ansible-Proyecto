---
# ── 1. Dependencias y repositorio ─────────────────────────────────────────────
- name: Instalar dependencias previas (Debian/Ubuntu)
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: true
  when: ansible_os_family == "Debian"

- name: Instalar dependencias previas (RedHat/CentOS)
  ansible.builtin.dnf:
    name:
      - yum-utils
      - device-mapper-persistent-data
      - lvm2
    state: present
  when: ansible_os_family == "RedHat"

- name: Añadir clave GPG de Docker (Debian/Ubuntu)
  ansible.builtin.shell: |
    install -m 0755 -d /etc/apt/keyrings
    curl -fsSL https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg \
      | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    chmod a+r /etc/apt/keyrings/docker.gpg
  args:
    creates: /etc/apt/keyrings/docker.gpg
  when: ansible_os_family == "Debian"

- name: Añadir repositorio de Docker (Debian/Ubuntu)
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ ansible_architecture }} signed-by=/etc/apt/keyrings/docker.gpg]
      https://download.docker.com/linux/{{ ansible_distribution | lower }}
      {{ ansible_distribution_release }} stable
    state: present
  when: ansible_os_family == "Debian"

- name: Añadir repositorio de Docker (RedHat/CentOS)
  ansible.builtin.command:
    cmd: yum-config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo
    creates: /etc/yum.repos.d/docker-ce.repo
  when: ansible_os_family == "RedHat"

# ── 2. Instalación ────────────────────────────────────────────────────────────
- name: Instalar Docker Engine (Debian/Ubuntu)
  ansible.builtin.apt:
    name: "{{ docker_packages }}"
    state: present
    update_cache: true
  when: ansible_os_family == "Debian"
  notify: Reiniciar docker

- name: Instalar Docker Engine (RedHat/CentOS)
  ansible.builtin.dnf:
    name: "{{ docker_packages }}"
    state: present
  when: ansible_os_family == "RedHat"
  notify: Reiniciar docker

# ── 3. Configuración del daemon ───────────────────────────────────────────────
- name: Crear directorio /etc/docker
  ansible.builtin.file:
    path: /etc/docker
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Desplegar daemon.json
  ansible.builtin.template:
    src: daemon.json.j2
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: "0644"
  notify: Reiniciar docker

- name: Habilitar y arrancar Docker
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Añadir usuarios al grupo docker
  ansible.builtin.user:
    name: "{{ item }}"
    groups: docker
    append: true
  loop: "{{ docker_users }}"
  when: docker_users | length > 0

# ── 4. Redes ──────────────────────────────────────────────────────────────────
- name: Crear redes Docker
  community.docker.docker_network:
    name: "{{ item.name }}"
    driver: "{{ item.driver | default('bridge') }}"
    internal: "{{ item.internal | default(false) }}"
    state: present
  loop: "{{ docker_networks }}"
  when: docker_networks | length > 0

# ── 5. Volúmenes ──────────────────────────────────────────────────────────────
- name: Crear volúmenes Docker
  community.docker.docker_volume:
    name: "{{ item.name }}"
    state: present
  loop: "{{ docker_volumes }}"
  when: docker_volumes | length > 0

# ── 6. Contenedores ───────────────────────────────────────────────────────────
- name: Desplegar contenedores
  community.docker.docker_container:
    name: "{{ item.name }}"
    image: "{{ item.image }}"
    state: "{{ item.state | default('started') }}"
    restart_policy: "{{ item.restart_policy | default('unless-stopped') }}"
    ports: "{{ item.ports | default([]) }}"
    volumes: "{{ item.volumes | default([]) }}"
    env: "{{ item.env | default({}) }}"
    networks: "{{ item.networks | default([]) }}"
    labels: "{{ item.labels | default({}) }}"
    pull: "{{ item.pull | default(true) }}"
    command: "{{ item.command | default(omit) }}"
  loop: "{{ docker_containers }}"
  when: docker_containers | length > 0
