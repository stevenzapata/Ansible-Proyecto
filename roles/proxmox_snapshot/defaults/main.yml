---
proxmox_host: ""           # IP o FQDN del nodo Proxmox — definir en group_vars o inventory
proxmox_port: 8006
proxmox_user: ""           # Usuario Proxmox, ej: root@pam — definir en group_vars o inventory
proxmox_token_name: ""     # Nombre del API token — definir en group_vars o inventory
proxmox_token_secret: "{{ vault_proxmox_token_secret }}"
proxmox_node: ""           # Nombre del nodo Proxmox, ej: pve — definir en group_vars o inventory
proxmox_snapshot_prefix: ansible_pre-update
proxmox_snapshot_description: "Snapshot automático pre-actualización — Ansible"
proxmox_task_retries: 24
proxmox_task_delay: 5
