---
# ── Linux (fail2ban) ─────────────────────────────────────────────────────────
fail2ban_bantime: 3600      # segundos baneado (1h)
fail2ban_findtime: 600      # ventana de tiempo para contar intentos
fail2ban_maxretry: 5        # intentos antes del baneo

# Jails a configurar
fail2ban_jails:
  - name: sshd
    enabled: true
    port: ssh
    logpath: /var/log/auth.log
    maxretry: 3

# Ejemplo de jails adicionales:
