# ── Windows (IPBan) ──────────────────────────────────────────────────────────
ipban_bantime: 3600         # segundos baneado
ipban_maxretry: 5           # intentos antes del baneo
ipban_install_dir_windows: 'C:\Program Files\IPBan'
