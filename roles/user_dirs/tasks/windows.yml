---
# item[0] = dict del usuario  |  item[1] = ruta con marcador $USER
# En Windows los permisos se gestionan con ACLs; win_file crea el directorio.
- name: Crear estructura de directorios
  ansible.windows.win_file:
    path: "{{ item[1] | replace('$USER', item[0].name) }}"
    state: directory
  loop: "{{ discovered_users | product(user_dirs_structure) | list }}"
  loop_control:
    label: "{{ item[1] | replace('$USER', item[0].name) }}"
