---
- name: Reiniciar postgresql
  ansible.builtin.service:
    name: postgresql
    state: restarted
  when: ansible_os_family != 'Windows'

- name: Reiniciar postgresql Windows
  ansible.windows.win_service:
    name: "{{ postgresql_service_name_windows }}"
    state: restarted
  when: ansible_os_family == 'Windows'
