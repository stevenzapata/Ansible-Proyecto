---
- name: Instalar PostgreSQL y dependencias Python (Debian/Ubuntu)
  ansible.builtin.apt:
    name:
      - "postgresql-{{ postgresql_version }}"
      - python3-psycopg2
    state: present
    update_cache: true
  when: ansible_os_family == "Debian"

- name: Instalar PostgreSQL y dependencias Python (RedHat/CentOS)
  ansible.builtin.dnf:
    name:
      - postgresql-server
      - python3-psycopg2
    state: present
  when: ansible_os_family == "RedHat"

- name: Inicializar cluster PostgreSQL (RedHat/CentOS)
  ansible.builtin.command:
    cmd: postgresql-setup --initdb
    creates: /var/lib/pgsql/data/postgresql.conf
  when: ansible_os_family == "RedHat"

- name: Habilitar y arrancar PostgreSQL
  ansible.builtin.service:
    name: postgresql
    state: started
    enabled: true

- name: Crear bases de datos
  community.postgresql.postgresql_db:
    name: "{{ item.name }}"
    owner: "{{ item.owner | default(omit) }}"
    encoding: "{{ item.encoding | default('UTF8') }}"
    state: present
  loop: "{{ postgresql_databases }}"
  become: true
  become_user: postgres
  when: postgresql_databases | length > 0

- name: Crear usuarios
  community.postgresql.postgresql_user:
    name: "{{ item.name }}"
    password: "{{ item.password }}"
    role_attr_flags: "{{ item.role_attr_flags | default('NOSUPERUSER,NOCREATEDB') }}"
    state: present
  loop: "{{ postgresql_users }}"
  become: true
  become_user: postgres
  when: postgresql_users | length > 0

- name: Asignar privilegios sobre bases de datos
  community.postgresql.postgresql_privs:
    db: "{{ item.db }}"
    roles: "{{ item.name }}"
    privs: ALL
    type: database
  loop: "{{ postgresql_users | selectattr('db', 'defined') | list }}"
  become: true
  become_user: postgres
  when: postgresql_users | length > 0
