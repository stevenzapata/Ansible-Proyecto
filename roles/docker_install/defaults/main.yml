---
# ── Linux ────────────────────────────────────────────────────────────────────
docker_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin

# ── Windows ──────────────────────────────────────────────────────────────────
# Instala la feature Hyper-V — necesario en VMs para usar isolation: hyperv
docker_hyperv_isolation: false
# Reiniciar automáticamente si la instalación de features lo requiere
docker_allow_reboot: false

# ── Compartido ───────────────────────────────────────────────────────────────
# Usuarios añadidos al grupo docker en Linux (pueden usar docker sin sudo)
docker_users: []
# Ejemplo:
# docker_users:
#   - stevenz
