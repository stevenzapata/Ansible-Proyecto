---
- name: Instalar Apache HTTP Server vía Chocolatey (Windows)
  chocolatey.chocolatey.win_chocolatey:
    name: apache-httpd
    state: present

- name: Crear directorio de configuración de VirtualHosts (Windows)
  ansible.windows.win_file:
    path: "{{ apache_vhost_dir_windows }}"
    state: directory

- name: Desplegar configuración de VirtualHost (Windows)
  ansible.windows.win_template:
    src: vhost.conf.j2
    dest: "{{ apache_vhost_dir_windows }}\\{{ apache_server_name }}.conf"
  notify: Reiniciar apache Windows

- name: Crear directorio webroot (Windows)
  ansible.windows.win_file:
    path: "{{ apache_webroot_windows }}"
    state: directory

- name: Desplegar página index de prueba (Windows)
  ansible.windows.win_copy:
    content: |
      <!DOCTYPE html>
      <html>
      <head><title>{{ apache_server_name }} - Ansible</title></head>
      <body><h1>Servidor Apache desplegado con Ansible</h1></body>
      </html>
    dest: "{{ apache_webroot_windows }}\\index.html"
  when: apache_deploy_test_page | bool

- name: Habilitar y arrancar Apache (Windows)
  ansible.windows.win_service:
    name: "{{ apache_service_name_windows }}"
    start_mode: auto
    state: started
