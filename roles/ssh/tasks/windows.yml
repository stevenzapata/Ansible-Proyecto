---
- name: Instalar OpenSSH Server (Windows)
  ansible.windows.win_shell: |
    $cap = Get-WindowsCapability -Online -Name 'OpenSSH.Server*'
    if ($cap.State -ne 'Installed') {
      Add-WindowsCapability -Online -Name OpenSSH.Server~~~~0.0.1.0
    }
  register: openssh_install
  changed_when: "'Installed' not in openssh_install.stdout"

- name: Desplegar configuración sshd (Windows)
  ansible.windows.win_template:
    src: sshd_config_windows.j2
    dest: 'C:\ProgramData\ssh\sshd_config'
  notify: Reiniciar sshd Windows

- name: Copiar claves públicas autorizadas (Windows)
  ansible.windows.win_lineinfile:
    path: "C:\\Users\\{{ item.name }}\\.ssh\\authorized_keys"
    line: "{{ item.public_key }}"
    create: true
  loop: "{{ ssh_users }}"
  when: ssh_users | length > 0

- name: Permitir SSH en el Firewall de Windows
  ansible.windows.win_firewall_rule:
    name: OpenSSH Server (sshd)
    localport: "{{ ssh_port }}"
    action: allow
    direction: in
    protocol: tcp
    state: present
    enabled: true

- name: Habilitar y arrancar sshd (Windows)
  ansible.windows.win_service:
    name: sshd
    start_mode: auto
    state: started
