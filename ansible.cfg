[defaults]
inventory           = inventory/hosts
vault_password_file = /root/.ssh/.vault_pass
roles_path          = roles
host_key_checking   = False
retry_files_enabled = False
stdout_callback     = yaml
gathering           = smart
fact_caching        = memory

[ssh_connection]
pipelining          = True
ssh_args            = -o ControlMaster=auto -o ControlPersist=60s
